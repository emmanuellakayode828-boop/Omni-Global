<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI | Science Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        :root { --mustard: #F4D35E; --purple: #878CD8; --raspberry: #AB273C; --charcoal: #1e293b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--mustard); color: var(--charcoal); margin: 0; padding: 40px; }
        
        .hub-container { max-width: 1000px; margin: 0 auto; }
        .subject-card { 
            background: white; border: 4px solid var(--charcoal); border-radius: 60px; 
            padding: 40px; text-align: center; transition: 0.3s; cursor: pointer;
            box-shadow: 10px 10px 0px var(--purple);
        }
        .subject-card:hover { transform: translateY(-10px); box-shadow: 15px 15px 0px var(--raspberry); }
        .back-btn { font-weight: 900; text-transform: uppercase; font-size: 12px; letter-spacing: 2px; border-bottom: 3px solid var(--charcoal); margin-bottom: 40px; display: inline-block; }
    </style>
</head>
<body>

    <div class="hub-container">
        <a href="index.html" class="back-btn">← Back to Main Hub</a>
        
        <h1 class="text-7xl font-black uppercase italic mb-4">Science <span class="text-[#AB273C]">Domain</span></h1>
        <p class="text-xl font-bold mb-16 text-slate-600 border-l-8 border-[#AB273C] pl-6 uppercase tracking-widest text-xs">Choose your area of mastery.</p>

        <div class="grid md:grid-cols-3 gap-10">
            <div class="subject-card" onclick="window.location.href='biology.html'">
                <div class="text-6xl mb-6">🧬</div>
                <h2 class="text-3xl font-black uppercase italic">Biology</h2>
                <p class="mt-4 font-bold text-slate-400 text-sm">G9 - G12 Curriculum</p>
            </div>

            <div class="subject-card" onclick="alert('Chemistry Module coming soon!')">
                <div class="text-6xl mb-6">🧪</div>
                <h2 class="text-3xl font-black uppercase italic">Chemistry</h2>
                <p class="mt-4 font-bold text-slate-400 text-sm">G10 - G12 Curriculum</p>
            </div>

            <div class="subject-card" onclick="alert('Physics Module coming soon!')">
                <div class="text-6xl mb-6">🚀</div>
                <h2 class="text-3xl font-black uppercase italic">Physics</h2>
                <p class="mt-4 font-bold text-slate-400 text-sm">G11 - G12 Curriculum</p>
            </div>
        </div>
    </div>

    <script src="gloobie.js"></script>
</body>
</html>
